audit_api_drift_task:
  description: >
    Perform a 'Three-Way Architecture Audit' using the target path '{target_path}'. 
    
    HIERARCHY OF TRUTH:
      1. DATABASE (First Truth): The physical reality. Use 'database_introspector'.
      2. OPENAPI (Final Truth): The external contract (found at 'server/openapi.json'). Use 'read_openapi_route'.
      3. CODE (The Bridge): Backend schemas (e.g. 'server/src/schemas.ts'). Use 'read_source_file'.
    
    To ensure 100% accuracy, you MUST build a comparison matrix for every model using a Markdown Table:
    | Model | DB Column | OpenAPI Property | Code Property | Status |
    | :--- | :--- | :--- | :--- | :--- |
    
    CRITICAL DRIFT RULES:
       - Any naming mismatch (e.g. `item_name` vs `order_name`) is [CRITICAL] 🚨.
       - Any missing field in ONE of the three sources is [CRITICAL] 🚨.
    
    TYPE COMPATIBILITY RULES (NOT CRITICAL):
       - DB Numeric types (bigint, int, numeric) == OpenAPI 'number' == Code 'number' type.
       - DB Date/Time types (timestamp, timestamptz, date) == OpenAPI 'string' == Code 'string' type.
       - These mappings are expected cross-layer translations and should NOT be marked as [CRITICAL] 🚨.
    
    Be extremely concise. Sacrifice grammar for the sake of concision. Provide exact facts.
  expected_output: >
    A highly structured "Drift Report". 
    If ANY [CRITICAL] naming or structural mismatches are found, you MUST start the report with the tag [DRIFT_DETECTED].
    List each mismatch with the level [CRITICAL] 🚨.
  agent: drift_analyzer

map_frontend_impact_task:
  description: >
    You are given a Drift Report:
    ---
    {drift_report}
    ---

    Your goal is to find every frontend file that uses the OLD (broken) field names from the Drift Report.

    MANDATORY STEPS — execute all of them in order:

    1. Extract the old field names from the Drift Report (e.g. 'price', 'item_name').

    2. DIRECT FILE SEARCH (primary method — do NOT skip this):
       - Use 'Read Source File' to read 'client/src/App.tsx' (cwd='{target_path}').
       - Use 'Read Source File' to read ALL .tsx and .ts files under 'client/src/' that you can find.
       - Scan each file's content for every old field name you extracted in step 1.
       - A file is IMPACTED if it references ANY old field name (e.g. order.item_name, item.price).

    3. GENERATED TYPES (secondary check):
       - Use 'Read Source File' to read 'client/src/api/types.d.ts'.
       - Verify the types now use the new field names. If not, this is also impacted.

    4. BUILD SCRIPTS (tertiary check):
       - Use 'Read Source File' to read 'client/package.json'.
       - Check for openapi-typescript or similar scripts.

    DO NOT rely solely on the dependency graph — openapi.json is a data file, not an ES module,
    so import-based graph tools will always return empty for it.
  expected_output: >
    An "Impact Report" listing every impacted file with the EXACT lines that must change.
    For each file, show the old line and the corrected line.

    FORMATTING RULES FOR PR COMMENT:
    - You MUST output beautiful GitHub Flavored Markdown (GFM).
    - Use ````ts```` code blocks to show exact before/after diffs.
    - Use Markdown Tables if listing multiple impacted files.
    - Use > blockquotes for critical warnings.
    - Omit conversational greetings.
  agent: blast_radius_mapper

suggest_remediation_task:
  description: >
    Analyze the following Drift Report:
    ---
    {drift_report}
    ---
    
    For every mismatch identified, provide the EXACT code change or SQL command to fix it.
    Follow the HIERARCHY OF TRUTH:
      - If DB and OpenAPI match, but CODE is different -> Update CODE.
      - If CODE and DB match, but OpenAPI is different -> Update OpenAPI.
      - If DB is the outlier -> Provide SQL migration to align DB to OpenAPI/Code.
    
    Format your output as a "Remediation Plan" with copy-pasteable blocks.
  expected_output: >
    A remediation plan with code/SQL blocks. Be extremely concise.
  agent: architecture_fixer

apply_frontend_fixes_task:
  description: >
    You are given an Impact Report describing which frontend files are broken:
    ---
    {impact_report}
    ---
    The cloned repository root is at: {target_path}

    For each broken file in the Impact Report:
      1. Use 'Read Source File' to read the file's CURRENT content.
         - cwd = '{target_path}'
         - filePath = the relative path (e.g. 'client/src/App.tsx')
      2. Identify ONLY the lines that reference the renamed/removed API fields.
      3. Apply the MINIMAL fix (e.g. rename order.price -> order.item_price).
      4. Use 'Write Source File' with the ABSOLUTE path:
         absoluteFilePath = '{target_path}' + '/' + relative path
         e.g. '{target_path}/client/src/App.tsx'
      5. Confirm success by checking the return value from Write Source File.

    DO NOT reformat files. DO NOT add imports unless absolutely required.
    DO NOT change lines unrelated to the API contract change.
  expected_output: >
    A summary wrapped in [FIXED_FILES] tags listing each modified file.
    Format:
    [FIXED_FILES]
    - client/src/App.tsx: renamed order.price -> order.item_price on line 42
    [/FIXED_FILES]
    If nothing needed changing: output [FIXED_FILES][/FIXED_FILES]
  agent: frontend_code_fixer

