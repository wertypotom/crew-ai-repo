audit_api_drift_task:
  description: >
    Perform a 'Three-Way Architecture Audit' using the target path '{target_path}'. 
    
    HIERARCHY OF TRUTH:
      1. DATABASE (First Truth): The physical reality. Use 'database_introspector'.
      2. OPENAPI (Final Truth): The external contract (found at 'server/openapi.json'). Use 'read_openapi_route'.
      3. CODE (The Bridge): Backend schemas (e.g. 'server/src/schemas.ts'). Use 'read_source_file'.
    
    To ensure 100% accuracy, you MUST build a comparison matrix for every model using a Markdown Table:
    | Model | DB Column | OpenAPI Property | Code Property | Status |
    | :--- | :--- | :--- | :--- | :--- |
    
    CRITICAL DRIFT RULES:
       - Any naming mismatch (e.g. `item_name` vs `order_name`) is [CRITICAL] 🚨.
       - Any missing field in ONE of the three sources is [CRITICAL] 🚨.
    
    TYPE COMPATIBILITY RULES (NOT CRITICAL):
       - DB Numeric types (bigint, int, numeric) == OpenAPI 'number' == Code 'number' type.
       - DB Date/Time types (timestamp, timestamptz, date) == OpenAPI 'string' == Code 'string' type.
       - These mappings are expected cross-layer translations and should NOT be marked as [CRITICAL] 🚨.
    
    Be extremely concise. Sacrifice grammar for the sake of concision. Provide exact facts.
  expected_output: >
    A highly structured "Drift Report". 
    If ANY [CRITICAL] naming or structural mismatches are found, you MUST start the report with the tag [DRIFT_DETECTED].
    List each mismatch with the level [CRITICAL] 🚨.
  agent: drift_analyzer

map_frontend_impact_task:
  description: >
    You are given a Drift Report:
    ---
    {drift_report}
    ---
    
    1. Analyze the Drift Report above to find the exact backend files that were modified or are inconsistent.
    2. MODULE GRAPH: Use the Get Dependency Graph tool (using cwd '{target_path}') to find all downstream frontend client files that import those modified backend files.
    3. BUILD SCRIPTS: Dependency graphs miss CLI commands! You MUST use 'read_source_file' to read the frontend 'package.json' (e.g. 'client/package.json' or 'package.json'). Check if any scripts (like 'openapi-typescript') reference the modified backend files (e.g. 'openapi.json').
    4. Use the Read Source File tool to investigate the logic inside any dependent files found in steps 2 and 3. Will the backend change break their logic, type definitions, or build scripts?
  expected_output: >
    An "Impact Report" detailing which frontend React components will break due to the backend changes. Provide the exact file paths and suggest specific code fixes for the frontend engineers.
    
    FORMATTING RULES FOR PR COMMENT:
    - You MUST output beautiful GitHub Flavored Markdown (GFM).
    - Use ````ts```` code blocks to show exact copy/paste diffs.
    - Use Markdown Tables if listing multiple impacted files.
    - Use > blockquotes for critical warnings.
    - Omit conversational greetings.
  agent: blast_radius_mapper

suggest_remediation_task:
  description: >
    Analyze the following Drift Report:
    ---
    {drift_report}
    ---
    
    For every mismatch identified, provide the EXACT code change or SQL command to fix it.
    Follow the HIERARCHY OF TRUTH:
      - If DB and OpenAPI match, but CODE is different -> Update CODE.
      - If CODE and DB match, but OpenAPI is different -> Update OpenAPI.
      - If DB is the outlier -> Provide SQL migration to align DB to OpenAPI/Code.
    
    Format your output as a "Remediation Plan" with copy-pasteable blocks.
  expected_output: >
    A remediation plan with code/SQL blocks. Be extremely concise.
  agent: architecture_fixer
