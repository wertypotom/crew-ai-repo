audit_api_drift_task:
  description: >
    Perform a 'Three-Way Architecture Audit' using the target path '{target_path}'. 
    To ensure 100% accuracy and avoid hallucinations, you MUST follow this worksheet for every model (e.g. 'Item', 'Order'):
    
    1. CODE vs DATABASE (First Truth): Verify Zod/models match physical DB columns.
    2. CODE vs OPENAPI (Final Truth): Verify implementation matches the frontend contract.
    3. OPENAPI vs DATABASE: Verify the contract reflects the physical data reality.
    
    To ensure 100% accuracy, you MUST follow this worksheet:
       [Model Name] | Property in Code | Column in DB | Property in OpenAPI
       --------------------------------------------------------------------
    RULE 1: HIERARCHY OF TRUTH:
       - DATABASE is the 'First Truth' (Physical reality).
       - OPENAPI is the 'Final Truth' (Frontend contract).
       - CODE (Zod/Schemas) is the bridge that must perfectly match BOTH.
    RULE 2: Naming mismatches (e.g. `item_name` in DB vs `name` in OpenAPI) are [CRITICAL] 🚨.
    RULE 3: Be extremely concise. Sacrifice grammar for the sake of concision. Provide exact facts and code.
  expected_output: >
    A highly structured "Drift Report" using the SEVERITY levels [CRITICAL] 🚨, [WARNING], and [NOTICE]. 
    For every [CRITICAL] drift, explicitly show the mismatch between Code, DB, and OpenAPI.
  agent: drift_analyzer

map_frontend_impact_task:
  description: >
    1. Read the Drift Report from the Drift Analyzer to find the exact backend files that were modified.
    2. Use the Get Dependency Graph tool (using cwd '{target_path}') to find all downstream frontend client files that import those modified backend files.
    3. Use the Read Source File tool to investigate the logic inside those dependent frontend files. Will the backend change break their logic or type definitions?
  expected_output: >
    An "Impact Report" detailing which frontend React components will break due to the backend changes. Provide the exact file paths and suggest specific code fixes for the frontend engineers.
    
    FORMATTING RULES FOR PR COMMENT:
    - You MUST output beautiful GitHub Flavored Markdown (GFM).
    - Use ````ts```` code blocks to show exact copy/paste diffs.
    - Use Markdown Tables if listing multiple impacted files.
    - Use > blockquotes for critical warnings.
    - Omit conversational greetings.
  agent: blast_radius_mapper
